# ========================================
# CI/CD Pipeline — Bunun Mazen Pharmacy
# ========================================
# Runs on every push to main and every PR
# Steps: lint → type-check → build → test → security scan
# ========================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1

jobs:
  # ===== Frontend: lint + type-check + build =====
  frontend:
    name: Frontend (Lint + Type-Check + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  # ===== Backend: clippy + test =====
  backend:
    name: Backend (Clippy + Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy (warnings as errors)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true # Don't block PRs on clippy initially

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

  # ===== Security: dependency audit =====
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+critical only)
        run: npm audit --audit-level=high
        continue-on-error: true # Don't block initially

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        working-directory: src-tauri
        run: cargo audit
        continue-on-error: true # Don't block initially
