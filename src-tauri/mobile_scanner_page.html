<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>صيدلية بنين مازن — الماسح اللاسلكي</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,sans-serif; }
body { background:#0f172a; color:#fff; min-height:100vh; display:flex; flex-direction:column; align-items:center; }
.header { background:#1e3a8a; padding:16px 20px; width:100%; text-align:center; position:sticky; top:0; z-index:100; }
.header h1 { font-size:18px; font-weight:700; }
.header .status { font-size:12px; margin-top:4px; opacity:0.8; }
#reader { width:100%; max-width:500px; margin:20px auto; border-radius:16px; overflow:hidden; min-height:200px; position:relative; }
#reader video { width:100%; border-radius:12px; }
#reader canvas { display:none; }
#result { padding:16px; width:100%; max-width:500px; }
.card { background:#1e293b; border-radius:12px; padding:16px; margin-bottom:12px; }
.card.found { border:2px solid #10b981; }
.card.notfound { border:2px solid #ef4444; }
.card.global { border:2px solid #f59e0b; }
.card h3 { font-size:16px; margin-bottom:8px; }
.card p { font-size:14px; color:#94a3b8; margin-bottom:4px; }
.card .price { font-size:24px; font-weight:700; color:#10b981; }
.btn { background:#1e3a8a; color:#fff; border:none; padding:12px 24px; border-radius:10px; font-size:16px; cursor:pointer; width:100%; margin-top:8px; }
.btn:active { background:#1e40af; }
.controls { display:flex; gap:8px; padding:12px; max-width:500px; width:100%; }
.controls .btn { flex:1; font-size:14px; padding:10px; }
.scan-count { font-size:12px; color:#64748b; text-align:center; padding:8px; }
.connected { color:#10b981; }
.disconnected { color:#ef4444; }
.scan-overlay { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:80%; height:40%; border:3px solid #10b981; border-radius:12px; pointer-events:none; box-shadow:0 0 0 1000px rgba(0,0,0,0.3); }
</style>
</head>
<body>
<div class="header">
<h1>💊 صيدلية بنين مازن</h1>
<div class="status" id="connStatus">جاري الاتصال...</div>
</div>
<div id="reader">
  <div class="scan-overlay"></div>
</div>
<div class="controls">
<button class="btn" id="torchBtn" onclick="toggleTorch()">🔦 الفلاش</button>
<button class="btn" id="modeBtn" onclick="toggleMode()">⏸ إيقاف</button>
</div>
<div class="scan-count" id="scanCount">0 عملية مسح</div>
<div id="result"></div>

<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<script>
let ws = null;
let scanning = true;
let scanCount = 0;
let lastBarcode = '';
let lastScanTime = 0;
let videoStream = null;
let torchOn = false;

const params = new URLSearchParams(window.location.search);
const token = params.get('token') || '';
const serverHost = window.location.hostname;
const serverPort = parseInt(window.location.port) || 8080;
const wsUrl = `ws://${serverHost}:${serverPort + 1}`;

function connectWS() {
  document.getElementById('connStatus').textContent = 'جاري الاتصال...';
  document.getElementById('connStatus').className = 'status';

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    document.getElementById('connStatus').textContent = '✓ متصل';
    document.getElementById('connStatus').className = 'status connected';
    if (token) {
      ws.send(JSON.stringify({ type: 'pair', token: token, deviceName: navigator.userAgent }));
    }
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type === 'scan_result') {
      displayResult(data.result);
      vibrate();
      playSound(data.result.status);
    }
  };

  ws.onclose = () => {
    document.getElementById('connStatus').textContent = '✗ انقطع — إعادة...';
    document.getElementById('connStatus').className = 'status disconnected';
    setTimeout(connectWS, 2000);
  };
}

function startScanner() {
  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: document.querySelector('#reader'),
      constraints: {
        facingMode: "environment",
        width: { min: 640 },
        height: { min: 480 },
        aspectRatio: { min: 1, max: 2 }
      }
    },
    locator: {
      patchSize: "medium",
      halfSample: true
    },
    numOfWorkers: 2,
    frequency: 10,
    decoder: {
      readers: [
        "ean_reader",
        "ean_8_reader",
        "upc_reader",
        "upc_e_reader",
        "code_128_reader",
        "code_39_reader",
        "codabar_reader",
        "i2of5_reader"
      ]
    },
    locate: true
  }, function(err) {
    if (err) {
      Quagga.init({
        inputStream: {
          name: "Live",
          type: "LiveStream",
          target: document.querySelector('#reader'),
          constraints: {
            width: { min: 640 },
            height: { min: 480 }
          }
        },
        locator: {
          patchSize: "medium",
          halfSample: true
        },
        numOfWorkers: 2,
        frequency: 10,
        decoder: {
          readers: [
            "ean_reader",
            "ean_8_reader",
            "upc_reader",
            "upc_e_reader",
            "code_128_reader",
            "code_39_reader",
            "codabar_reader",
            "i2of5_reader"
          ]
        },
        locate: true
      }, function(err2) {
        if (err2) {
          document.querySelector('#reader').innerHTML =
            '<div style="padding:20px;text-align:center;color:#ef4444;">فشل تشغيل الكاميرا: ' + err2 + '</div>';
        } else {
          Quagga.start();
          videoStream = Quagga.CameraAccess.getActiveStream();
        }
      });
    } else {
      Quagga.start();
      videoStream = Quagga.CameraAccess.getActiveStream();
    }
  });

  Quagga.onDetected(function(result) {
    if (!scanning) return;
    const decodedText = result.codeResult.code;
    const now = Date.now();
    if (decodedText === lastBarcode && (now - lastScanTime) < 2000) return;
    lastBarcode = decodedText;
    lastScanTime = now;

    scanCount++;
    document.getElementById('scanCount').textContent = scanCount + ' عملية مسح';

    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'scan', barcode: decodedText, deviceName: 'Mobile' }));
    }
  });
}

function displayResult(result) {
  const el = document.getElementById('result');
  let html = '';

  if (result.status === 'found') {
    html = `<div class="card found">
      <h3>✅ ${result.nameAr}</h3>
      <p>الباركود: ${result.barcodeType || ''}</p>
      <p>الكمية: ${result.quantity}</p>
      <p class="price">${result.price} د.ع</p>
    </div>`;
  } else if (result.status === 'global_found') {
    html = `<div class="card global">
      <h3>🌍 ${result.name || ''}</h3>
      <p>${result.activeIngredient || ''}</p>
      <p>${result.brandName || ''} • ${result.strength || ''}</p>
      <p>النوع: ${result.barcodeType || ''}</p>
      <p style="color:#f59e0b;">دواء عالمي — غير موجود في المخزون</p>
    </div>`;
  } else {
    html = `<div class="card notfound">
      <h3>❌ غير موجود</h3>
      <p>الباركود: ${result.barcode}</p>
      <p>النوع: ${result.barcodeType}</p>
    </div>`;
  }

  el.innerHTML = html + el.innerHTML;
  if (el.children.length > 10) el.lastChild.remove();
}

function vibrate() {
  if (navigator.vibrate) navigator.vibrate(100);
}

function playSound(status) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = status === 'found' ? 800 : status === 'global_found' ? 600 : 300;
    osc.type = status === 'found' ? 'sine' : 'square';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.2);
  } catch(e) {}
}

function toggleMode() {
  scanning = !scanning;
  document.getElementById('modeBtn').textContent = scanning ? '⏸ إيقاف' : '▶ استئناف';
}

function toggleTorch() {
  torchOn = !torchOn;
  if (videoStream) {
    const track = videoStream.getVideoTracks()[0];
    if (track) {
      track.applyConstraints({ advanced: [{ torch: torchOn }] }).catch(() => {});
    }
  }
}

connectWS();
startScanner();
</script>
</body>
</html>
